name: Build

on:
  push:
    branches: [trunk]
  pull_request:
    branches: [trunk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate version from timestamp
        id: version
        run: echo "value=$(date -u +'%Y.%-m.%-d.%-H%M')" >> "$GITHUB_OUTPUT"

      - name: Build and test
        run: ./gradlew buildPlugin test -PpluginVersion=${{ steps.version.outputs.value }}

      - name: Sign and publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/trunk'
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin -PpluginVersion=${{ steps.version.outputs.value }}
